# sync-dev-version.yml — auto-sync dev's package.json to the latest release tag.
#
# Why this exists:
#   The `promote` script (v1.6.13+) cherry-picks dev's content onto main
#   without touching dev. This keeps dev SHAs stable across releases but
#   leaves dev's `package.json.version` lagging behind whatever main's
#   latest release bumped to. Over time, the lag becomes a cherry-pick
#   landmine: any dev commit that touches package.json carries a stale
#   version field as context, which conflicts when main has moved ahead.
#
#   This workflow fires on every `v*` tag push (same event that triggers
#   release.yml) and bumps dev's package.json + server.json + package-lock
#   to match the tag version. Each run produces a one-step bump on dev,
#   whose diff is patch-id-equivalent to main's corresponding bump commit,
#   so `git cherry` in the next `promote` run transparently skips it.
#
# Permissions:
#   - `contents: write` is required to push the sync commit back to `dev`.
#   - Uses the default `GITHUB_TOKEN`, which by design does NOT trigger
#     further workflow runs, so pushing to dev here does NOT re-fire
#     ci.yml (no infinite loop).
#
# Interaction with dev branch protection:
#   The `obsidian-brain/dev` ruleset blocks deletion but allows push /
#   force-push. A plain push from this workflow lands cleanly.
#
# Safety:
#   - Version-compares dev's current version against the tag. If dev is
#     already at or AHEAD of the tag version (cosmetic edge case), skip.
#   - If dev is more than one step behind, the bump is a skip-ahead and
#     its patch-id won't match main's single-step bump — detected and
#     warned, does NOT create the sync commit. Manual catch-up needed
#     once per deviation.
#   - `npm version --no-git-tag-version` updates package.json + lockfile
#     without a commit; the `version` lifecycle hook
#     (scripts/sync-server-version.mjs) updates server.json.

name: Sync dev package.json to latest release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  sync:
    name: Bump dev to match ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v6
        with:
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Resolve target version from tag
        id: ver
        run: echo "new_ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decide whether to sync
        id: decide
        run: |
          dev_ver=$(jq -r .version package.json)
          new_ver="${{ steps.ver.outputs.new_ver }}"
          echo "dev_ver=$dev_ver" >> "$GITHUB_OUTPUT"

          # Skip if dev is already at or ahead of the tag (version-sorted).
          highest=$(printf '%s\n%s\n' "$dev_ver" "$new_ver" | sort -V | tail -1)
          if [ "$dev_ver" = "$new_ver" ] || [ "$highest" = "$dev_ver" ]; then
            echo "sync=false" >> "$GITHUB_OUTPUT"
            echo "Skipping — dev ($dev_ver) is already at or ahead of tag ($new_ver)."
            exit 0
          fi

          # Warn if the gap is more than one patch step — the sync commit
          # will not be patch-id-equivalent to main's bump and could bite
          # a future cherry-pick promote. We still apply it (dev needs to
          # catch up somehow) but flag it loud.
          dev_major=$(echo "$dev_ver" | cut -d. -f1)
          dev_minor=$(echo "$dev_ver" | cut -d. -f2)
          dev_patch=$(echo "$dev_ver" | cut -d. -f3)
          new_major=$(echo "$new_ver" | cut -d. -f1)
          new_minor=$(echo "$new_ver" | cut -d. -f2)
          new_patch=$(echo "$new_ver" | cut -d. -f3)

          if [ "$dev_major" != "$new_major" ] || [ "$dev_minor" != "$new_minor" ] || [ "$((new_patch - dev_patch))" != "1" ]; then
            echo "::warning::Sync is a skip-ahead ($dev_ver → $new_ver). Patch-id will NOT match main's bump commit. Future promote cherry-picking through this commit may conflict."
          fi

          echo "sync=true" >> "$GITHUB_OUTPUT"

      - name: Bump package.json + server.json + lockfile
        if: steps.decide.outputs.sync == 'true'
        run: |
          npm version "${{ steps.ver.outputs.new_ver }}" \
            --no-git-tag-version \
            --allow-same-version
          # `version` lifecycle hook (scripts/sync-server-version.mjs) already
          # runs and stages server.json. We re-stage everything below anyway.

      - name: Commit and push
        if: steps.decide.outputs.sync == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json server.json package-lock.json
          git commit -m "chore: sync dev package.json to v${{ steps.ver.outputs.new_ver }}"
          git push origin dev
